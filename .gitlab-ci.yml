image: alpine:latest

stages:
  - deploy

deploy:
  stage: deploy

  before_script:
    - apk add --no-cache openssh-client git
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H 13.234.240.220 >> ~/.ssh/known_hosts

  script:
    - |
      ssh -i ~/.ssh/id_ed25519 ubuntu@13.234.240.220 "
        cd /var/www/html &&
        git fetch origin &&
        git reset --hard origin/master
      "

  only:
    - master